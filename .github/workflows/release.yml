name: Build & Publish Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["Create Release Tag"]
    types:
      - completed

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          latest_tag=$(git tag --list 'v*' --sort=-version:refname | head -n 1)
          if [ -n "$latest_tag" ]; then
            git checkout "$latest_tag"
          fi
        shell: bash

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle
        run: chmod +x gradlew

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release.keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      - name: Build and Sign Release APKs
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Determine release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            tag=$(git tag --list 'v*' --sort=-version:refname | head -n 1)
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.release.outputs.tag != ''
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
