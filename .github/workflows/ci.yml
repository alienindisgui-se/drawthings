name: Test & Build

on:
  push:
    branches:
      - '*'

jobs:
  build:
    name: Compile & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle
        run: chmod +x gradlew

      - name: Compile Release Kotlin
        run: ./gradlew compileReleaseKotlin
